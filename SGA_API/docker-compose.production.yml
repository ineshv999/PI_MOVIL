# Caddy es el unico punto publico. API, PostgreSQL y monitoreo permanecen privados.
x-api: &api
  build: .
  restart: unless-stopped
  environment: &api-env
    APP_ENV: production
    APP_DEBUG: "false"
    PUBLIC_WEB_URL: ${PUBLIC_WEB_URL:-https://qractivos.xyz}
    POSTGRES_HOST: postgres
    POSTGRES_PORT: 5432
    POSTGRES_DB: ${POSTGRES_DB}
    POSTGRES_USER: ${POSTGRES_USER}
    POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    JWT_ALGORITHM: HS256
    ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-30}
    REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS:-7}
    ENCRYPTION_KEY: ${ENCRYPTION_KEY}
    BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS}
    EVIDENCE_DIRECTORY: /app/uploads/evidencias
    MAX_EVIDENCE_SIZE_MB: ${MAX_EVIDENCE_SIZE_MB:-5}
  depends_on:
    postgres:
      condition: service_healthy
    migrate:
      condition: service_completed_successfully
  networks: [private]
  volumes: [evidence_data:/app/uploads]
  healthcheck:
    test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
    interval: 15s
    timeout: 5s
    retries: 5

services:
  api1:
    <<: *api
  api2:
    <<: *api

  migrate:
    build: .
    restart: "no"
    command: ["sh", "-c", "alembic upgrade head && python scripts/init_db.py"]
    environment: *api-env
    depends_on:
      postgres:
        condition: service_healthy
    networks: [private]

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes: [postgres_production:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [private]

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports: ["80:80", "443:443"]
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api1: {condition: service_healthy}
      api2: {condition: service_healthy}
    networks: [public, private]

  prometheus:
    image: prom/prometheus:v3.5.0
    restart: unless-stopped
    command: ["--config.file=/etc/prometheus/prometheus.yml", "--storage.tsdb.retention.time=15d"]
    volumes:
      - ./infra/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks: [private]

  grafana:
    image: grafana/grafana:12.1.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
    volumes: [grafana_data:/var/lib/grafana]
    networks: [private]

networks:
  public:
  private:
    internal: true

volumes:
  postgres_production:
  evidence_data:
  caddy_data:
  caddy_config:
  prometheus_data:
  grafana_data:
